services:
  orthanc:
    image: orthancteam/orthanc:latest-full
    restart: unless-stopped
    ports:
      - "8042:8042"
      - "4242:4242"
      - "104:104"
    environment:
      ORTHANC__REGISTERED_USERS: "{}"
      VERBOSE_STARTUP: "true"
      SERVE_FOLDERS_PLUGIN_ENABLED: "true"
      TRANSFERS_PLUGIN_ENABLED: "true"
      ORTHANC_WEB_VIEWER_PLUGIN_ENABLED: "true"
      OSIMIS_WEB_VIEWER1_ALPHA_PLUGIN_ENABLED: "true"
      VOLVIEW_PLUGIN_ENABLED: "true"
      OHIF_PLUGIN_ENABLED: "true"
      MPPS_SCP_PLUGIN_ENABLED: "true"
      MPPS_SCP_AE_TITLE: "PACS_SERVER"
      MPPS_SCP_PORT: "4242"
      ORTHANC_DB_HOST: "${ORTHANC_DB_HOST:-postgresql}"
      ORTHANC_DB_USER: "${ORTHANC_DB_USER:-orthanc}"
      ORTHANC_DB_PASSWORD: "${ORTHANC_DB_PASSWORD:-change-me}"
      ORTHANC_DB_NAME: "${ORTHANC_DB_NAME:-orthanc}"
      DICOM_WEB_PLUGIN_ENABLED: '{"DicomWeb": true, "Enable": true}'
      ORTHANC_EXPLORER_2_ENABLED: '{"Enable": true, "IsDefaultOrthancUI": false}'
      MODALITY_WORKLISTS_PLUGIN_ENABLED: "true"
      MODALITY_WORKLISTS_DIRECTORY: "/worklists"
      ORTHANC__Verbose: "true"
    volumes:
      - ./containers/orthanc/data:/var/lib/orthanc/db
      - ./containers/orthanc/config/orthanc.json:/etc/orthanc/orthanc.json
      # Worklists volume is used for the legacy approach
      # The recommended approach is to use the Orthanc REST API
      # See doc/WORKLIST-API.md for more information
      - ./containers/shared/worklists:/worklists
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - dicom-network

  postgresql:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-orthanc}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
      POSTGRES_DB: "${POSTGRES_DB:-orthanc}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./containers/postgresql/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc -d orthanc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dicom-network

  pgweb:
    image: sosedoff/pgweb
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: "postgres://${POSTGRES_USER:-orthanc}:${POSTGRES_PASSWORD:-change-me}@${POSTGRES_HOST:-postgresql}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-orthanc}?sslmode=disable"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - dicom-network

  worklist-web:
    # build: ./worklist_web
    image: idperiksa/periksa-radiologi-worklist:latest
    container_name: worklist_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-postgresql}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_USER: "${POSTGRES_USER:-orthanc}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
      POSTGRES_DB: "${POSTGRES_DB:-orthanc}"
      DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME:-admin}"
      DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD:-change-me-admin}"
      DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL:-admin@example.com}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-this-in-env}"
      DJANGO_DEBUG: "${DJANGO_DEBUG:-False}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-*}"
      ORTHANC_URL: "${ORTHANC_URL:-http://orthanc:8042}"
      CLINIC_ID: "${CLINIC_ID:-}"
      PERIKSA_API_USERNAME: "${PERIKSA_API_USERNAME:-}"
      PERIKSA_API_PASSWORD: "${PERIKSA_API_PASSWORD:-}"
      SATUSEHAT_URL: "${SATUSEHAT_URL:-https://api-satusehat.kemkes.go.id}"
      SATUSEHAT_ORG_ID: "${SATUSEHAT_ORG_ID:-}"
      SATUSEHAT_CLIENT: "${SATUSEHAT_CLIENT:-}"
      SATUSEHAT_SECRET: "${SATUSEHAT_SECRET:-}"
    volumes:
      - ./containers/shared/worklists:/worklists
      - ./containers/worklist-web/runtime/staticfiles:/app/staticfiles
      - ./containers/worklist-web/runtime/media:/app/media
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - dicom-network

  dicom-kemenkes:
    image: registry.dto.kemkes.go.id/pub/dicom-router:latest
    container_name: dicom-router
    restart: always
    ports:
      - "11112:11112"
      - "8080:8080"
    environment:
      - ORG_ID=${SATUSEHAT_ORG_ID:-}
      - CLIENT=${SATUSEHAT_CLIENT:-}
      - SECRET=${SATUSEHAT_SECRET:-}
      - URL=${SATUSEHAT_URL:-https://api-satusehat.kemkes.go.id}
    networks:
      - dicom-network
  backup:
    image: postgres:14
    restart: "no"
    environment:
      PGPASSWORD: "${POSTGRES_PASSWORD:-change-me}"
    volumes:
      - ./containers/backup/data:/backups
      - ./scripts:/scripts
    networks:
      - dicom-network
    profiles:
      - backup

networks:
  dicom-network:
    driver: bridge
