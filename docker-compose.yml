services:
  orthanc:
    image: orthancteam/orthanc:latest-full
    restart: unless-stopped
    ports:
      - "8042:8042"
      - "4242:4242"
    environment:
      ORTHANC__REGISTERED_USERS: "{}"
      VERBOSE_STARTUP: "true"
      SERVE_FOLDERS_PLUGIN_ENABLED: "true"
      TRANSFERS_PLUGIN_ENABLED: "true"
      ORTHANC_WEB_VIEWER_PLUGIN_ENABLED: "true"
      OSIMIS_WEB_VIEWER1_ALPHA_PLUGIN_ENABLED: "true"
      VOLVIEW_PLUGIN_ENABLED: "true"
      OHIF_PLUGIN_ENABLED: "true"
      MPPS_SCP_PLUGIN_ENABLED: "true"
      MPPS_SCP_AE_TITLE: "PACS_SERVER"
      MPPS_SCP_PORT: "4242"
      ORTHANC_DB_HOST: "postgresql"
      ORTHANC_DB_USER: "orthanc"
      ORTHANC_DB_PASSWORD: "orthanc_password"
      ORTHANC_DB_NAME: "orthanc"
      DICOM_WEB_PLUGIN_ENABLED: '{"DicomWeb": true, "Enable": true}'
      ORTHANC_EXPLORER_2_ENABLED: '{"Enable": true, "IsDefaultOrthancUI": false}'
      MODALITY_WORKLISTS_PLUGIN_ENABLED: "true"
      MODALITY_WORKLISTS_DIRECTORY: "/worklists"
      ORTHANC__Verbose: "true"
    volumes:
      - ./containers/orthanc/data:/var/lib/orthanc/db
      - ./containers/orthanc/config/orthanc.json:/etc/orthanc/orthanc.json
      - ./containers/shared/worklists:/worklists
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - dicom-network

  postgresql:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: orthanc_password
      POSTGRES_DB: orthanc
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./containers/postgresql/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc -d orthanc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dicom-network

  pgweb:
    image: sosedoff/pgweb
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: "postgres://orthanc:orthanc_password@postgresql:5432/orthanc?sslmode=disable"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - dicom-network

  worklist-web:
    image: idperiksa/periksa-radiologi-worklist:latest
    container_name: worklist_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: 5432
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: orthanc_password
      POSTGRES_DB: orthanc
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SECRET_KEY: "django-insecure-change-this-in-production"
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      ORTHANC_URL: "http://orthanc:8042"
      PERIKSA_API_URL: "http://periksaapis.com"
      URL: "https://api-satusehat.kemkes.go.id"
      
      # ENV YANG HARUS DIGANTI SESUAI DENGAN KONFIGURASI PERIKSA API DAN SATUSEHAT KEMKES
      CLINIC_ID: "3e6b957c-14f2-11ec-aaa7-02b7e2fe1700"
      PERIKSA_API_USERNAME: "7aMzvF8vCG06B4EFij4zdneBZPZFfEK1PGtsIYa5G0pu7p3G"
      PERIKSA_API_PASSWORD: "zAGQsV8oAwY24bm4oPc40YsSV64D2H7QFoXBb0NRI0PewQi959x6qQ48tTa1GOQO"
      SATUSEHAT_ORG_ID: "100026351"
      SATUSEHAT_CLIENT: "7aMzvF8vCG06B4EFij4zdneBZPZFfEK1PGtsIYa5G0pu7p3G"
      SATUSEHAT_SECRET: "zAGQsV8oAwY24bm4oPc40YsSV64D2H7QFoXBb0NRI0PewQi959x6qQ48tTa1GOQO"
      
    volumes:
      - ./containers/shared/worklists:/worklists
      - ./containers/worklist-web/runtime/staticfiles:/app/staticfiles
      - ./containers/worklist-web/runtime/media:/app/media
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - dicom-network

  dicom-kemenkes:
    image: registry.dto.kemkes.go.id/pub/dicom-router:latest
    container_name: dicom-router
    restart: always
    ports:
      - "11112:11112"
      - "8080:8080"
    environment:
      URL: "https://api-satusehat.kemkes.go.id"
      ORG_ID: "100026351"
      CLIENT: "7aMzvF8vCG06B4EFij4zdneBZPZFfEK1PGtsIYa5G0pu7p3G"
      SECRET: "zAGQsV8oAwY24bm4oPc40YsSV64D2H7QFoXBb0NRI0PewQi959x6qQ48tTa1GOQO"
    networks:
      - dicom-network

  backup:
    image: postgres:16
    restart: "no"
    environment:
      PGPASSWORD: orthanc_password
    volumes:
      - ./containers/backup/data:/backups
      - ./scripts:/scripts
    networks:
      - dicom-network
    profiles:
      - backup

networks:
  dicom-network:
    driver: bridge
